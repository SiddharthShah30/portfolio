<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="0; url=staticcv.html">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecting to Static CV</title>
<meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="shortcut icon" href="favicon.svg">
<script>
(function () {
	const host = window.location.hostname;
	if (window.location.protocol === 'http:' && host !== 'localhost' && host !== '127.0.0.1') {
		window.location.replace('https://' + window.location.host + window.location.pathname + window.location.search + window.location.hash);
		return;
	}
})();
window.location.replace('staticcv.html');
</script>
</head>
<body>
<p>Redirecting to <a href="staticcv.html">staticcv.html</a>...</p>
</body>
</html>
